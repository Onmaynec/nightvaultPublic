name: Build and publish NightVault

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Project diagnostics
        run: npm run doctor

      - name: Syntax check
        run: npm run check

      - name: Build NSIS installer and portable app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --publish always

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NightVault-Windows
          path: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap
